<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inference Report</title>
    <style>
        body {
            background-color: #000;
            color: #eee;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .report-box {
            border: 2px solid #333;
            width: 500px;
            background: #0a0a0a;
            position: relative;
        }
        .header {
            background: #333;
            color: #000;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .content {
            padding: 20px;
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 20px;
        }
        img {
            width: 150px;
            height: 150px;
            border: 1px solid #444;
            filter: grayscale(0.2);
            object-fit: cover;
        }
        .data-panel {
            border-left: 1px solid #333;
            padding-left: 20px;
        }
        .prediction {
            font-size: 1.5rem;
            color: #00ff41; /* Terminal Green */
            margin: 0;
            text-transform: uppercase;
        }
        .meta {
            font-size: 0.8rem;
            color: #888;
            margin-top: 10px;
        }
        .footer {
            border-top: 1px solid #333;
            padding: 10px;
            text-align: right;
        }
        a {
            color: #ff6b00;
            text-decoration: none;
            font-size: 0.8rem;
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="report-box">
        <div class="header">INFERENCE_REPORT_V1.0</div>
        <div class="content">
            <img src="{{ image_path }}" alt="Input">
            <div class="data-panel">
                <div class="meta">OBJECT_CLASS:</div>
                <h2 class="prediction">{{ prediction }}</h2>
                
                <div class="meta" style="margin-top:20px;">CONFIDENCE_SCORE:</div>
                <div style="font-size: 1.2rem;">{{ confidence }}%</div>
            </div>
        </div>
        <div class="footer">
            <a href="/">[ RETURN_TO_INPUT ]</a>
        </div>
    </div>
</body>
</html>
